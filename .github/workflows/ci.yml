name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid burning minutes on duplicate runs when force-pushing or rapid PR
# updates: cancel any in-flight run for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci || npm install
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      # ADVISORY (v0.7.49): ESLint over the existing ~108-finding baseline
      # (incl. real react-hooks/rules-of-hooks violations queued as bug-fixes).
      # Non-blocking until triaged; drop the `|| echo` to make it a gate.
      - name: ESLint (advisory)
        working-directory: frontend
        run: npx eslint src || echo "::warning title=eslint::lint findings — triage (non-blocking)"
      # First frontend test gate (v0.7.25). Vitest over the pure lib/ helpers
      # that carry incident history (unit formatters, timeRangeToNs now()-trap,
      # escapeHTML XSS, dashboard-var expansion). Runs before the build so a
      # broken helper fails fast.
      - name: Unit tests (vitest)
        working-directory: frontend
        run: npx vitest run
      - name: Build (Vite SPA)
        working-directory: frontend
        run: npx vite build
      - name: Upload built UI for the Go job
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  backend:
    name: Backend (vet + build + test)
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          # check-latest: the hosted runner's toolcache can lag a patch
          # behind (v0.8.557 incident: cache served 1.25.11 while the
          # crypto/tls fix GO-2026-5856 landed in 1.25.12, so the hard
          # govulncheck gate red-balled main on a vuln that was already
          # fixed upstream). Resolving latest costs a few seconds and
          # keeps the security gate scanning the stdlib we actually ship.
          check-latest: true
          cache: true
      # main.go uses //go:embed all:frontend/dist, so the Go build
      # needs the Vite-rendered SPA from the frontend job.
      - name: Pull built UI
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      # CLAUDE.md's release flow requires "go test ./... pre-tag", and every
      # bug-fix ships a regression test — but nothing ENFORCED it in CI, so a
      # forgotten local run could ship a regression undetected. This is the gate.
      - name: go test
        run: go test ./...
      # Race detector on the concurrency-heavy packages (background agent runner,
      # notifier fan-out, SSE broker, Redis cache/locks) where a data race would
      # otherwise hide until a production heisenbug.
      - name: go test -race (concurrency packages)
        run: go test -race ./internal/agent/... ./internal/notify/... ./internal/sse/... ./internal/cache/...

  lint:
    name: Lint (golangci-lint)
    needs: frontend
    runs-on: ubuntu-latest
    # ADVISORY (v0.7.26): the existing ~32-finding standard-set baseline
    # (errcheck/govet/ineffassign/staticcheck/unused) is being triaged — real
    # bugs ship as their own bug-fix releases, intentional patterns get
    # excluded in .golangci.yml. Drop continue-on-error to make this a hard
    # gate once `golangci-lint run` is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          # check-latest: the hosted runner's toolcache can lag a patch
          # behind (v0.8.557 incident: cache served 1.25.11 while the
          # crypto/tls fix GO-2026-5856 landed in 1.25.12, so the hard
          # govulncheck gate red-balled main on a vuln that was already
          # fixed upstream). Resolving latest costs a few seconds and
          # keeps the security gate scanning the stdlib we actually ship.
          check-latest: true
          cache: true
      # golangci-lint compiles the package graph → needs the //go:embed SPA.
      - name: Pull built UI
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          # Advisory: exit 0 even with findings (the ~32-finding baseline is
          # being triaged). The job stays green; findings surface as
          # annotations. Drop this + continue-on-error to make it a hard gate.
          args: --issues-exit-code=0

  security:
    name: Security (vuln + dep scan)
    needs: frontend
    runs-on: ubuntu-latest
    # HARD GATE (v0.8.554) — the v0.7.34 advisory period is over: the
    # baseline was cleaned in v0.8.552 (npm: 0 critical/high) and v0.8.553
    # (govulncheck: 0 reachable), and all three scanners were verified
    # exit-0 locally before this flip. A freshly-disclosed CVE now
    # redballs the PR — that is the point; triage happens by fixing or
    # pinning, not by merging past it.
    permissions:
      contents: read
      # upload-sarif writes code-scanning alerts (Trivy results → Security tab).
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          # check-latest: the hosted runner's toolcache can lag a patch
          # behind (v0.8.557 incident: cache served 1.25.11 while the
          # crypto/tls fix GO-2026-5856 landed in 1.25.12, so the hard
          # govulncheck gate red-balled main on a vuln that was already
          # fixed upstream). Resolving latest costs a few seconds and
          # keeps the security gate scanning the stdlib we actually ship.
          check-latest: true
          cache: true
      # main.go embeds frontend/dist (//go:embed) — govulncheck type-checks +
      # builds the package graph, so it needs the rendered SPA like the backend
      # job does. Pull the artifact instead of rebuilding the frontend here.
      - name: Pull built UI
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist
      # govulncheck only flags vulnerabilities in code paths actually REACHED
      # (call-graph analysis), so false positives are rare — which is what
      # makes it safe as a blocking gate.
      - name: govulncheck (Go reachable CVEs)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
      # --audit-level=high: moderate advisories don't block (10 exist with
      # no non-major fix); critical/high do.
      - name: npm audit (frontend deps)
        working-directory: frontend
        run: npm audit --audit-level=high
      # Trivy filesystem scan: catches vulnerable pinned versions in go.sum /
      # package-lock.json that govulncheck's reachability filter skips, plus
      # any leaked secret / misconfig. exit-code 1 on HIGH/CRITICAL — the
      # SARIF upload below still runs (if: always()) so the Security tab
      # sees the findings that failed the gate.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        env:
          # offline-scan (v0.8.559 niyeti, v0.9.74'te DÜZELTİLDİ):
          # java-demo/jboss-demo pom'larının parent BOM'larını tararken
          # Maven Central'a çıkılıyor; runner IP'si Central'ın rate-limit
          # havuzunu tüm GitHub'la paylaştığından 429 (Retry-After: 1800)
          # trivy'yi FATAL'lıyor ve gate'i bir dış servisin keyfine göre
          # kırmızıya çeviriyordu. offline-scan trivy-action'ın GEÇERLİ
          # bir INPUT'u DEĞİL (sessizce warn'layıp yok sayıyordu — CI hep
          # 429'a düşüyordu); trivy binary --offline-scan'i BU env
          # değişkeninden okur ve action onu geçirir. Lockfile taramaları
          # (go.sum, package-lock) aynen sürer; yalnız uzak pom inheritance
          # atlanır ve o pom'lar shipped binary'nin değil demo
          # üreteçlerinin.
          TRIVY_OFFLINE_SCAN: 'true'
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-results.sarif
          # v0.9.77 — java-demo/jboss-demo: pom-taşıyan demo yük üreteçleri,
          # shipped Go binary DEĞİL. tomcat/spring bulguları (24 HIGH/CRIT)
          # ürünle alakasız; taramaya dahil etmek gate'i demo bağımlılığına
          # bağlıyor. node_modules/dist zaten build çıktısı.
          skip-dirs: frontend/node_modules,frontend/dist,java-demo,jboss-demo
      - name: Upload Trivy results to the Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  helm:
    name: Helm (lint + template)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: 'v3.15.0'
      - name: helm lint
        run: helm lint charts/coremetry
      # Render with optional features on so we catch broken conditionals
      # that the lint pass alone would miss.
      - name: helm template (full features)
        run: |
          helm template ci charts/coremetry \
            --set ingress.enabled=true \
            --set 'ingress.hosts[0].host=ci.example.com' \
            --set 'ingress.hosts[0].paths[0].path=/' \
            --set 'ingress.hosts[0].paths[0].pathType=Prefix' \
            --set autoscaling.enabled=true \
            --set config.auth.oidc.enabled=true \
            --set config.auth.oidc.issuerUrl=https://example.com \
            --set secrets.jwtSecret=ci-test \
            > /dev/null
