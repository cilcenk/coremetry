name: Release

on:
  push:
    tags: ['v*.*.*']
  # Manual trigger so a maintainer can re-publish without re-tagging.
  workflow_dispatch:

permissions:
  contents: write       # create release + push to gh-pages branch
  packages: write       # push image to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # cilcenk/coremetry

jobs:
  docker:
    name: Build + push Docker image
    runs-on: ubuntu-latest
    # continue-on-error: a failed Docker push (typically a
    # GHCR write_package permission_denied when the orphan
    # package from a prior repo deletion blocks the new
    # repo's GITHUB_TOKEN) shouldn't kill the rest of the
    # release. Helm chart + GitHub Release entry still ship,
    # and a maintainer can re-run the Docker step manually
    # once the package linkage is fixed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      # amd64 only by default — building arm64 via QEMU on the free
      # ubuntu-latest runner takes 15–20 min per release. OpenShift
      # clusters are overwhelmingly x86, so this covers ~95% of users.
      # If you need arm64 (Apple Silicon dev, AWS Graviton), set
      # vars.BUILD_PLATFORMS=linux/amd64,linux/arm64 in repo settings.
      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ vars.BUILD_PLATFORMS || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  java-demo:
    name: Build + push Java demo image
    # Optional companion image used by the chart's javaDemo.enabled toggle.
    # Independent of the main coremetry image so a Java-only change doesn't
    # rebuild the Go binary, and vice versa.
    runs-on: ubuntu-latest
    # Same continue-on-error rationale as the main docker job.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-java-demo
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: ./java-demo
          platforms: ${{ vars.BUILD_PLATFORMS || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=java-demo
          cache-to: type=gha,mode=max,scope=java-demo

  helm:
    name: Package + publish Helm chart (OCI)
    # Helm chart push doesn't depend on the Docker image
    # being on GHCR — the chart references an image tag but
    # the registry resolves it at deploy time. Decoupling
    # lets the chart ship even when Docker hits the orphan-
    # package permission issue.
    runs-on: ubuntu-latest
    # Helm OCI push goes to the same GHCR registry, so it can
    # trip the same orphan-package permission issue. Allow it
    # to fail without killing the GitHub Release step.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v5
        with:
          version: 'v3.15.0'
      - name: Sync Chart appVersion to git tag
        run: |
          # Strip the leading "v" from refs/tags/v0.1.0 → 0.1.0
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version:.*/version: $VERSION/"     charts/coremetry/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/coremetry/Chart.yaml
      - name: Package chart
        run: helm package charts/coremetry --destination .helm-out
      # Push the chart as an OCI artifact to GHCR — modern way to
      # distribute Helm charts. Lands at:
      #   oci://ghcr.io/${{ github.repository_owner }}/charts/coremetry:<version>
      # which `helm install coremetry oci://ghcr.io/.../charts/coremetry --version X`
      # can pull directly without a separate index repo (no gh-pages dance).
      - name: Login to GHCR for Helm OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              -u "${{ github.actor }}" --password-stdin
      - name: Push chart to OCI
        run: |
          helm push .helm-out/coremetry-${VERSION}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

  release:
    name: GitHub Release
    # No `needs:` — docker / helm can both fail without
    # blocking the GitHub Release notes entry. The notes
    # reference the expected image / chart URLs; if those
    # didn't actually publish, a maintainer re-runs the
    # specific failing job after fixing GHCR permissions.
    # `if: always()` ensures we run even when upstream jobs
    # in the same workflow failed.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            Docker image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            Helm chart:   `helm install coremetry oci://ghcr.io/${{ github.repository_owner }}/coremetry-chart --version ${{ github.ref_name }}`
