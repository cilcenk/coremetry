name: Release

on:
  push:
    tags: ['v*.*.*']
  # Manual trigger so a maintainer can re-publish without re-tagging.
  workflow_dispatch:

permissions:
  contents: write       # create release + push to gh-pages branch
  packages: write       # push image to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # cilcenk/qmetry

jobs:
  docker:
    name: Build + push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      # amd64 only by default — building arm64 via QEMU on the free
      # ubuntu-latest runner takes 15–20 min per release. OpenShift
      # clusters are overwhelmingly x86, so this covers ~95% of users.
      # If you need arm64 (Apple Silicon dev, AWS Graviton), set
      # vars.BUILD_PLATFORMS=linux/amd64,linux/arm64 in repo settings.
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ vars.BUILD_PLATFORMS || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Package + publish Helm chart (OCI)
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'
      - name: Sync Chart appVersion to git tag
        run: |
          # Strip the leading "v" from refs/tags/v0.1.0 → 0.1.0
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version:.*/version: $VERSION/"     charts/qmetry/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/qmetry/Chart.yaml
      - name: Package chart
        run: helm package charts/qmetry --destination .helm-out
      # Push the chart as an OCI artifact to GHCR — modern way to
      # distribute Helm charts. Lands at:
      #   oci://ghcr.io/${{ github.repository_owner }}/charts/qmetry:<version>
      # which `helm install qmetry oci://ghcr.io/.../charts/qmetry --version X`
      # can pull directly without a separate index repo (no gh-pages dance).
      - name: Login to GHCR for Helm OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              -u "${{ github.actor }}" --password-stdin
      - name: Push chart to OCI
        run: |
          helm push .helm-out/qmetry-${VERSION}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

  release:
    name: GitHub Release
    needs: [docker, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            Helm chart:   `helm install qmetry oci://ghcr.io/${{ github.repository_owner }}/qmetry-chart --version ${{ github.ref_name }}`
