{{- if and .Values.clickhouse.enabled (not .Values.clickhouse.external.addr) -}}
# Single-node bundled ClickHouse. Suitable for dev + small prod. For
# production-grade deployments use the Altinity Operator instead and
# point clickhouse.external.addr at the resulting Service.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "coremetry.fullname" . }}-clickhouse
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  type: {{ .Values.clickhouse.service.type }}
  selector:
    {{- include "coremetry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
  # Headless not required — coremetry connects via the Service name.
  ports:
    - name: native
      port: {{ .Values.clickhouse.service.nativePort }}
      targetPort: native
    - name: http
      port: {{ .Values.clickhouse.service.httpPort }}
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "coremetry.fullname" . }}-clickhouse
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: {{ include "coremetry.fullname" . }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      {{- include "coremetry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        {{- include "coremetry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: clickhouse
    spec:
      {{- include "coremetry.imagePullSecrets" (dict "imageRoot" .Values.clickhouse.image "global" .Values.global) | nindent 6 }}
      {{- with .Values.clickhouse.podSecurityContext }}
      securityContext: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse
          image: {{ include "coremetry.image" (dict "imageRoot" .Values.clickhouse.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          # Container SC is values-driven (clickhouse.containerSecurityContext).
          # The official clickhouse-server image's USER is root (it drops to
          # uid 101 internally), so runAsNonRoot:true WITHOUT a runAsUser is
          # REJECTED on vanilla k8s — only an OpenShift SCC injects a uid at
          # admission. Default keeps the hardened block (OpenShift + anyuid);
          # set it to {} on vanilla k8s / minikube to let the image run as
          # its own user.
          {{- with .Values.clickhouse.containerSecurityContext }}
          securityContext: {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - { name: native, containerPort: 9000 }
            - { name: http,   containerPort: 8123 }
          env:
            # Official CH env vars (different from bitnami's CLICKHOUSE_ADMIN_*)
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.database | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: clickhouse-password
                  optional: true
            # Allow `default` user to manage roles via SQL — useful when
            # coremetry creates additional schemas at first boot.
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          readinessProbe:
            tcpSocket: { port: native }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket: { port: native }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          resources: {{- toYaml .Values.clickhouse.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{ toYaml .Values.clickhouse.storage.accessModes | nindent 10 }}
        {{- with .Values.clickhouse.storage.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.storage.size }}
{{- end -}}
