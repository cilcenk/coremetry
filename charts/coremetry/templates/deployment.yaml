{{/*
  v0.6.2 — this file renders the monolithic (single-Deployment)
  topology. When .Values.deployment.mode = "distributed", three
  separate Deployments are rendered from deployment-distributed.yaml
  and this file is skipped.
*/}}
{{- if eq (default "monolithic" .Values.deployment.mode) "monolithic" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coremetry.fullname" . }}
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  # v0.8.193 — explicit rolling-update strategy. Kubernetes' default
  # (maxUnavailable: 25%) lets the READY-endpoint set of the headless ingest
  # Service (clusterIP:None) shrink while new pods boot — and coremetry boot is
  # slow (CH connect retries + schema migrations). When the set drops toward
  # zero, the OTel collector's gRPC dns:/// + round_robin exporter hits "zero
  # addresses" and WEDGES: it doesn't re-resolve even after pods return, so the
  # memory_limiter back-pressures and 503s every app's telemetry until the
  # collector is manually restarted (operator-reported, recurring after every
  # rollout). maxUnavailable: 0 keeps each old pod Ready until its replacement
  # is Ready, so the headless Service never loses all endpoints and the exporter
  # never sees zero-addresses. Pairs with the server MaxConnectionAge (v0.8.159)
  # + retry_on_failure (otel-collector.yaml). Surge headroom is cheap — the pods
  # are heavily under-utilised. Override via deployment.rollingUpdate.* .
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ (.Values.deployment.rollingUpdate | default dict).maxUnavailable | default 0 }}
      maxSurge: {{ (.Values.deployment.rollingUpdate | default dict).maxSurge | default 1 }}
  # Selector includes `component: coremetry` so it doesn't accidentally adopt
  # ClickHouse / Redis / OTel-Collector pods (they share the chart-wide
  # name + instance labels). This selector is immutable post-create — see
  # NOTES.txt for the upgrade path from chart < 0.1.3.
  selector:
    matchLabels:
      {{- include "coremetry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: coremetry
  template:
    metadata:
      labels:
        {{- include "coremetry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: coremetry
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      annotations:
        # Roll the pods whenever the rendered config or secret changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "coremetry.serviceAccountName" . }}
      {{- include "coremetry.imagePullSecrets" (dict "imageRoot" .Values.image "global" .Values.global) | nindent 6 }}
      # No wait-for-clickhouse init container: chstore.New() retries the CH
      # connection for ~2 min at boot (24 attempts, internal/chstore/store.go),
      # so the app handles a not-yet-ready ClickHouse itself. An init container
      # shelling out to `nc` is redundant and a needless failure point on
      # minimal / distroless images (busybox `nc -z` is not always present).
      {{- with .Values.podSecurityContext }}
      securityContext: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coremetry
          image: {{ include "coremetry.image" (dict "imageRoot" .Values.image "global" .Values.global "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext: {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
          env:
            - name: COREMETRY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: jwt-secret
                  optional: true
            - name: COREMETRY_CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: clickhouse-password
                  optional: true
            {{- if .Values.clickhouse.clusterName }}
            - name: COREMETRY_CH_CLUSTER_NAME
              value: {{ .Values.clickhouse.clusterName | quote }}
            {{- end }}
            {{- if .Values.clickhouse.replicaPath }}
            - name: COREMETRY_CH_REPLICA_PATH
              value: {{ .Values.clickhouse.replicaPath | quote }}
            {{- end }}
            {{- if .Values.clickhouse.shardKey }}
            - name: COREMETRY_CH_SHARD_KEY
              value: {{ .Values.clickhouse.shardKey | quote }}
            {{- end }}
            - name: COREMETRY_INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: initial-admin-password
                  optional: true
            {{- if .Values.config.auth.oidc.enabled }}
            - name: COREMETRY_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: oidc-client-secret
            {{- end }}
            {{- $redisURL := include "coremetry.redisURL" . }}
            {{- if $redisURL }}
            - name: COREMETRY_REDIS_URL
              value: {{ $redisURL | quote }}
            {{- end }}
            {{- if .Values.selfObs.enabled }}
            - name: COREMETRY_SELF_OBS_OTLP_ENDPOINT
              value: {{ .Values.selfObs.endpoint | default (printf "%s-otelcol:%v" (include "coremetry.fullname" .) .Values.otelCollector.service.grpcPort) | quote }}
            - name: COREMETRY_SELF_OBS_SAMPLE_RATE
              value: {{ .Values.selfObs.sampleRate | quote }}
            {{- end }}
            {{- if eq (default "clickhouse" .Values.logs.backend) "elasticsearch" }}
            # External Elasticsearch read-backend wiring. Ingest still
            # writes to ClickHouse; only /api/logs reads come from ES.
            - name: COREMETRY_LOGS_BACKEND
              value: "elasticsearch"
            - name: COREMETRY_ES_ADDRESSES
              value: {{ join "," .Values.logs.elasticsearch.addresses | quote }}
            - name: COREMETRY_ES_INDEX
              value: {{ .Values.logs.elasticsearch.index | quote }}
            {{- if .Values.logs.elasticsearch.username }}
            - name: COREMETRY_ES_USERNAME
              value: {{ .Values.logs.elasticsearch.username | quote }}
            {{- end }}
            {{- if .Values.logs.elasticsearch.insecureSkipVerify }}
            - name: COREMETRY_ES_INSECURE
              value: "true"
            {{- end }}
            # Password + API key always referenced; empty Secret values
            # are harmless at runtime, and the indirection means rotating
            # an API key is `kubectl edit secret` + pod restart, no chart
            # bump.
            - name: COREMETRY_ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: es-password
                  optional: true
            - name: COREMETRY_ES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: es-api-key
                  optional: true
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            # Static binary needs a writable /tmp; the rest of root is read-only.
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 15
            failureThreshold: 4
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "coremetry.fullname" . }}-config
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{ toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
