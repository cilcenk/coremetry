{{/*
  v0.6.2 — this file renders the monolithic (single-Deployment)
  topology. When .Values.deployment.mode = "distributed", three
  separate Deployments are rendered from deployment-distributed.yaml
  and this file is skipped.
*/}}
{{- if eq (default "monolithic" .Values.deployment.mode) "monolithic" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coremetry.fullname" . }}
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  # Selector includes `component: coremetry` so it doesn't accidentally adopt
  # ClickHouse / Redis / OTel-Collector pods (they share the chart-wide
  # name + instance labels). This selector is immutable post-create — see
  # NOTES.txt for the upgrade path from chart < 0.1.3.
  selector:
    matchLabels:
      {{- include "coremetry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: coremetry
  template:
    metadata:
      labels:
        {{- include "coremetry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: coremetry
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      annotations:
        # Roll the pods whenever the rendered config or secret changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "coremetry.serviceAccountName" . }}
      {{- include "coremetry.imagePullSecrets" (dict "imageRoot" .Values.image "global" .Values.global) | nindent 6 }}
      # Wait for ClickHouse to be reachable before the coremetry binary
      # tries to migrate. The coremetry image is alpine + busybox so `nc`
      # is available; runs as the same non-root UID 65532.
      initContainers:
        - name: wait-for-clickhouse
          image: {{ include "coremetry.image" (dict "imageRoot" .Values.image "global" .Values.global "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext: {{ toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              addr="{{ include "coremetry.clickhouseAddr" . }}"
              host="${addr%:*}"
              port="${addr##*:}"
              echo "[init] waiting for clickhouse at $host:$port (up to 120s)"
              for i in $(seq 1 60); do
                if nc -z -w 2 "$host" "$port" 2>/dev/null; then
                  echo "[init] clickhouse is reachable, proceeding"
                  exit 0
                fi
                # Pre-startup: clickhouse may take a few seconds to
                # open its listener — this poll line is expected
                # noise during normal cold starts, not a failure.
                echo "[init] clickhouse not yet listening (poll $i/60), retrying in 2s"
                sleep 2
              done
              echo "[init] gave up after 120s — clickhouse at $host:$port never became reachable" >&2
              exit 1
      {{- with .Values.podSecurityContext }}
      securityContext: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coremetry
          image: {{ include "coremetry.image" (dict "imageRoot" .Values.image "global" .Values.global "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext: {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
          env:
            - name: COREMETRY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: jwt-secret
                  optional: true
            - name: COREMETRY_CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: clickhouse-password
                  optional: true
            - name: COREMETRY_INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: initial-admin-password
                  optional: true
            {{- if .Values.config.auth.oidc.enabled }}
            - name: COREMETRY_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: oidc-client-secret
            {{- end }}
            {{- $redisURL := include "coremetry.redisURL" . }}
            {{- if $redisURL }}
            - name: COREMETRY_REDIS_URL
              value: {{ $redisURL | quote }}
            {{- end }}
            {{- if .Values.selfObs.enabled }}
            - name: COREMETRY_SELF_OBS_OTLP_ENDPOINT
              value: {{ .Values.selfObs.endpoint | default (printf "%s-otelcol:%v" (include "coremetry.fullname" .) .Values.otelCollector.service.grpcPort) | quote }}
            - name: COREMETRY_SELF_OBS_SAMPLE_RATE
              value: {{ .Values.selfObs.sampleRate | quote }}
            {{- end }}
            {{- if eq (default "clickhouse" .Values.logs.backend) "elasticsearch" }}
            # External Elasticsearch read-backend wiring. Ingest still
            # writes to ClickHouse; only /api/logs reads come from ES.
            - name: COREMETRY_LOGS_BACKEND
              value: "elasticsearch"
            - name: COREMETRY_ES_ADDRESSES
              value: {{ join "," .Values.logs.elasticsearch.addresses | quote }}
            - name: COREMETRY_ES_INDEX
              value: {{ .Values.logs.elasticsearch.index | quote }}
            {{- if .Values.logs.elasticsearch.username }}
            - name: COREMETRY_ES_USERNAME
              value: {{ .Values.logs.elasticsearch.username | quote }}
            {{- end }}
            {{- if .Values.logs.elasticsearch.insecureSkipVerify }}
            - name: COREMETRY_ES_INSECURE
              value: "true"
            {{- end }}
            # Password + API key always referenced; empty Secret values
            # are harmless at runtime, and the indirection means rotating
            # an API key is `kubectl edit secret` + pod restart, no chart
            # bump.
            - name: COREMETRY_ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: es-password
                  optional: true
            - name: COREMETRY_ES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: es-api-key
                  optional: true
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            # Static binary needs a writable /tmp; the rest of root is read-only.
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 15
            failureThreshold: 4
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "coremetry.fullname" . }}-config
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{ toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
