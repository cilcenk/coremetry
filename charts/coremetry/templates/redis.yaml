{{- if and .Values.redis.enabled (not .Values.redis.external.url) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coremetry.fullname" . }}-redis
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  strategy: { type: Recreate }   # single-instance dev redis; no rolling
  selector:
    matchLabels:
      {{- include "coremetry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "coremetry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      {{- include "coremetry.imagePullSecrets" (dict "imageRoot" .Values.redis.image "global" .Values.global) | nindent 6 }}
      containers:
        - name: redis
          image: {{ include "coremetry.image" (dict "imageRoot" .Values.redis.image "global" .Values.global) | quote }}
          # Container SC is values-driven (redis.containerSecurityContext).
          # The official redis image's USER is root (the entrypoint drops to
          # the redis user via gosu), so runAsNonRoot:true WITHOUT a runAsUser
          # is REJECTED on vanilla k8s — only an OpenShift SCC injects a uid.
          # Default keeps the hardened block (OpenShift); set {} on vanilla
          # k8s / minikube to let the image run as its own user. Data is
          # ephemeral (appendonly + RDB off below) so uid churn is harmless.
          {{- with .Values.redis.containerSecurityContext }}
          securityContext: {{ toYaml . | nindent 12 }}
          {{- end }}
          # All cached/locked data is rebuildable from ClickHouse, so
          # appendonly + RDB are off. Treat this Redis as ephemeral.
          args: ["redis-server", "--appendonly", "no", "--save", ""]
          ports:
            - name: redis
              containerPort: 6379
          # /tmp is mounted writable for redis's runtime sockets/PID file
          # so readOnlyRootFilesystem doesn't break startup.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 5
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "coremetry.fullname" . }}-redis
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "coremetry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
{{- end -}}
