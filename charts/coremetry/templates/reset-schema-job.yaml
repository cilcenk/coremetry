{{- if .Values.clickhouse.resetSchema }}
# DESTRUCTIVE: Helm pre-install + pre-upgrade hook. Drops the
# configured CH database so the main coremetry pod boots into
# an empty schema and rebuilds it via the migration sequence.
# Triggered only when `clickhouse.resetSchema: true` is set —
# default is false. Hook-delete-policy removes the Job after
# success so it doesn't pile up across upgrades.
#
# The Job uses the same coremetry image + same ConfigMap +
# Secret as the main Deployment, just with `--reset-schema`
# args. That way credentials, addr, cluster_name flow through
# identically — drop matches what the app would have built.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "coremetry.fullname" . }}-reset-schema
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: reset-schema
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  # The drop is fast (single DDL); 5 min is generous for the
  # CH-not-yet-up retry envelope inside the binary.
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 60
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "coremetry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: reset-schema
    spec:
      serviceAccountName: {{ include "coremetry.serviceAccountName" . }}
      restartPolicy: OnFailure
      {{- include "coremetry.imagePullSecrets" (dict "imageRoot" .Values.image "global" .Values.global) | nindent 6 }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: reset-schema
          image: {{ include "coremetry.image" (dict "imageRoot" .Values.image "global" .Values.global "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext: {{ toYaml . | nindent 12 }}
          {{- end }}
          args: ["--reset-schema"]
          env:
            - name: COREMETRY_CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "coremetry.secretName" . }}
                  key: clickhouse-password
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: config
          configMap:
            name: {{ include "coremetry.fullname" . }}-config
        - name: tmp
          emptyDir: {}
{{- end }}
