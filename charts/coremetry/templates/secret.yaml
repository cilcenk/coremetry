{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coremetry.fullname" . }}-secret
  labels: {{- include "coremetry.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* v0.8.343 (HA audit H7) — multi-pod + empty jwtSecret ships
     auth-flapping out of the box: each pod mints its own ephemeral
     signing key, so JWTs from pod A 401 on pod B behind the LB. Known
     footgun (documented in ops memory) that nothing enforced. Fail the
     render loudly instead of shipping a broken login. */}}
  {{- $multiPod := or (gt (int .Values.replicaCount) 1) .Values.autoscaling.enabled (eq .Values.deployment.mode "distributed") }}
  {{- if and $multiPod (not .Values.secrets.jwtSecret) (not .Values.secrets.existingSecret) }}
  {{- fail "coremetry: replicaCount>1 / autoscaling / distributed mode requires a shared JWT signing key — set secrets.jwtSecret (e.g. openssl rand -hex 32) or point secrets.existingSecret at a Secret carrying jwt-secret. Without it every pod mints its own ephemeral key and logins flap across the LB." }}
  {{- end }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  clickhouse-password: {{ .Values.secrets.clickHousePassword | quote }}
  oidc-client-secret: {{ .Values.secrets.oidcClientSecret | quote }}
  initial-admin-password: {{ .Values.secrets.initialAdminPassword | quote }}
  # Always rendered so flipping logs.backend → elasticsearch later doesn't
  # require re-creating the Secret. Empty values are no-ops at runtime
  # (the env var is set but Coremetry treats "" as "no credential").
  es-password: {{ .Values.secrets.esPassword | quote }}
  es-api-key:  {{ .Values.secrets.esApiKey | quote }}
{{- end -}}
