{{/*
  v0.6.2 — Service shape depends on deployment.mode.

  monolithic — one Service `<fullname>` fronts the single Deployment,
               same as v0.5.X. Both http (UI/API) + otlp-grpc on it.

  distributed — three Services match each role's Deployment:
               <fullname>          — alias for the api role (kept so
                                     ingress / route / clients point
                                     at the stable name)
               <fullname>-ingest   — OTLP grpc + http health
               <fullname>-api      — http (UI/API/SSE)
               <fullname>-worker   — http health only (no traffic
                                     routed here; this exists so
                                     `kubectl get svc` reflects the
                                     full topology)

  The stable `<fullname>` Service is critical: ingress/route templates
  reference it by name. In distributed mode it must select api pods,
  so the otel-collector forwarding to it and the operator hitting
  the UI both still resolve correctly.
*/}}
{{- $mode := default "monolithic" .Values.deployment.mode -}}
{{- $fullname := include "coremetry.fullname" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry
  {{- with .Values.service.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- /* v0.6.21 — sticky-session affinity for MCP + SSE.
        Applied on the stable Service (and the per-role Services
        below) so MCP sessions stay on the pod they initialised
        on. Only emits the affinity block when it's set to
        something other than "None" — keeps the manifest clean
        on installs that opt out. */ -}}
  {{- if and .Values.service.sessionAffinity (ne .Values.service.sessionAffinity "None") }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.service.sessionAffinityTimeoutSeconds | default 10800 }}
  {{- end }}
  selector:
    {{- include "coremetry.selectorLabels" . | nindent 4 }}
    {{- if eq $mode "distributed" }}
    # In distributed mode the stable name aliases the api role —
    # ingress + external clients reach UI/API through it.
    app.kubernetes.io/component: coremetry-api
    {{- else }}
    app.kubernetes.io/component: coremetry
    {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    {{- if eq $mode "monolithic" }}
    - name: otlp-grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
    {{- if .Values.service.otlpHttp }}
    - name: otlp-http
      port: {{ .Values.service.otlpHttpPort | default 4318 }}
      targetPort: otlp-http
      protocol: TCP
    {{- end }}
    {{- end }}
---
{{/* v0.8.171 — headless Service for in-cluster gRPC round-robin to the OTLP
     ingest endpoint. A normal ClusterIP load-balances per-CONNECTION, and
     OTLP/gRPC multiplexes everything over one long-lived HTTP/2 connection —
     so a collector's stream pins to a single replica (the load test saw one
     pod take ~all spans). clusterIP:None makes DNS return EVERY ingest pod IP,
     so the in-cluster otel-collector's exporter (balancer_name: round_robin
     over a dns:/// target) spreads RPCs across all replicas. Complements the
     server-side MaxConnectionAge connection recycle (v0.8.159). Selects the
     OTLP-receiving pods: the all-mode pods in monolithic, the ingest role in
     distributed. Always rendered (1 replica → 1 address → harmless). */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-ingest-headless
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry-ingest-headless
spec:
  clusterIP: None
  selector:
    {{- include "coremetry.selectorLabels" . | nindent 4 }}
    {{- if eq $mode "distributed" }}
    app.kubernetes.io/component: coremetry-ingest
    {{- else }}
    app.kubernetes.io/component: coremetry
    {{- end }}
  ports:
    - name: otlp-grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
{{- if eq $mode "distributed" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-ingest
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry-ingest
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "coremetry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry-ingest
  ports:
    - name: otlp-grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    {{- if .Values.service.otlpHttp }}
    # OTLP/HTTP — dedicated :4318 listener on ingest pods (POST /v1/*), separate
    # from the Web UI/REST on httpPort. Serves ONLY OTLP (no UI, no auth). HTTPS
    # is edge-terminated at the Route/Ingress/LB; the binary speaks plain HTTP.
    - name: otlp-http
      port: {{ .Values.service.otlpHttpPort | default 4318 }}
      targetPort: otlp-http
      protocol: TCP
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-api
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry-api
spec:
  type: {{ .Values.service.type }}
  # v0.6.21 — sticky affinity carries through to the per-role
  # api Service too, so an MCP client talking to <release>-api
  # directly (bypassing the stable name) still pins to one pod.
  {{- if and .Values.service.sessionAffinity (ne .Values.service.sessionAffinity "None") }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.service.sessionAffinityTimeoutSeconds | default 10800 }}
  {{- end }}
  selector:
    {{- include "coremetry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry-api
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-worker
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry-worker
spec:
  # Worker Service exists for /api/health probe + observability;
  # no caller routes traffic here. Stays ClusterIP-internal even
  # if the parent service.type is LoadBalancer — workers never
  # take external traffic.
  type: ClusterIP
  selector:
    {{- include "coremetry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry-worker
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
{{- end }}
