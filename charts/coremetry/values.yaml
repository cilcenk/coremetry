## Coremetry default values
## Override anything here with --set or a custom values file.

# ── Global image override ───────────────────────────────────────────────────
#
# When `global.imageRegistry` is set it REPLACES the .registry of every
# image in this chart (coremetry, ClickHouse, Redis, OTel Collector). Built
# for air-gapped clusters that mirror upstream images into an internal
# registry — e.g.:
#
#   global:
#     imageRegistry: docker.artifacthub.registry.example.com
#
# Mirrors expected at:
#   docker.artifacthub.registry.example.com/cilcenk/coremetry:0.1.4
#   docker.artifacthub.registry.example.com/clickhouse/clickhouse-server:24.8-alpine
#   docker.artifacthub.registry.example.com/library/redis:7-alpine
#   docker.artifacthub.registry.example.com/otel/opentelemetry-collector-contrib:0.111.0
#
# Per-image overrides (.image.registry on each component) take priority
# over the global. Set imagePullSecrets here when the registry is private.
global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  # Built and pushed by .github/workflows/release.yml on every v*.*.* tag.
  # Public on GHCR — no pullSecrets needed by default.
  registry: "ghcr.io"
  repository: "cilcenk/coremetry"
  tag: ""               # defaults to .Chart.appVersion
  pullPolicy: IfNotPresent
  pullSecrets: []       # legacy field — prefer global.imagePullSecrets

replicaCount: 1         # safe to scale up — Redis lock arbitrates background workers

# Pod-level options
podAnnotations: {}
podLabels: {}
# Pod-level SC. Empty by default so OpenShift's restricted-v2 SCC can pick
# its own UID + fsGroup at admission time. Override only if you need to
# pin a UID (you'll then need an SCC binding to allow it).
podSecurityContext: {}

# Container-level SC. Conforms to "restricted-v2" (OpenShift) and
# "restricted" PSS — no explicit runAsUser so the platform assigns one
# from its allocated range; keeps the chart drop-in for OpenShift.
securityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities: { drop: ["ALL"] }
  seccompProfile:
    type: RuntimeDefault
nodeSelector: {}
tolerations: []
affinity: {}

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

service:
  type: ClusterIP
  httpPort: 8088        # Web UI + REST API + direct OTLP/HTTP fallback
  grpcPort: 4317        # OTLP/gRPC ingest (apps + collector forward here)
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: coremetry.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: coremetry-tls
  #   hosts: [coremetry.example.com]

# OpenShift native Route — preferred over Ingress on OCP because the
# router handles edge TLS automatically with the cluster cert. Use either
# `ingress.enabled` (vanilla k8s) OR `route.enabled` (OpenShift), not both.
route:
  enabled: false
  host: ""             # leave empty → OpenShift router auto-generates one
  annotations: {}
  tls:
    enabled: true
    termination: edge  # edge | reencrypt | passthrough
    insecureEdgeTerminationPolicy: Redirect

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Coremetry config block ───────────────────────────────────────────────────────
# Mirrors config.yaml. Anything here is rendered into a ConfigMap and mounted.
# Sensitive fields (jwtSecret, ClickHouse password, OIDC client secret,
# initialAdmin password) come from the Secret instead — see `secrets:` below.
config:
  retention:
    spansDays: 30
    logsDays: 30
    metricsDays: 7
  ingestion:
    batchSize: 10000
    bufferSize: 100000
    flushInterval: "5s"
    workers: 4
  auth:
    tokenTTL: "24h"
    initialAdmin: "admin@coremetry.local"
    oidc:
      enabled: false
      issuerUrl: ""
      clientId: ""
      redirectUrl: ""
      scopes: ["openid", "email", "profile"]
      displayName: "SSO"
      defaultRole: "viewer"
      allowedDomains: []

# Sensitive values land in a Secret. Override these or point existingSecret
# at a pre-created Secret with the same keys.
secrets:
  jwtSecret: ""             # leave empty in dev → Coremetry generates an ephemeral key
  clickHousePassword: ""
  oidcClientSecret: ""
  initialAdminPassword: "admin"
  # External Elasticsearch credentials (only consulted when logs.backend ==
  # "elasticsearch"). Set ONE of esApiKey OR (esUsername in logs block +
  # esPassword here). API key is preferred — it can be scoped to a single
  # index pattern and rotated without touching user accounts.
  esPassword: ""            # for HTTP basic auth (paired with logs.elasticsearch.username)
  esApiKey: ""              # base64 "id:api_key" — the `encoded` field from POST /_security/api_key
  existingSecret: ""        # if set, Coremetry reads JWT/CH/OIDC/init-admin/es from it instead

# ── ClickHouse ───────────────────────────────────────────────────────────────
#
# Two modes:
#  • `enabled: true` → bundle a single-node CH StatefulSet inside the chart
#    (good for dev + small prod, ~1-2GB RAM, single PVC). The Service is
#    auto-discovered by the coremetry pods.
#  • `enabled: false` → connect to an external CH (Altinity Operator,
#    ClickHouse Cloud, etc.) — point `external.addr` at it.
#
# Setting `external.addr` even when `enabled: true` overrides the in-cluster
# Service, so you can flip from bundled → external without disabling the
# StatefulSet immediately (use Pause Deletion / two-step migration).
clickhouse:
  enabled: true

  # DESTRUCTIVE: when true, a Helm pre-install + pre-upgrade Job
  # runs `coremetry --reset-schema` against the configured CH
  # (in-cluster or external) BEFORE the app pod starts. Drops the
  # whole database — every span, log, metric, dashboard, audit
  # event — so the install proceeds against a clean slate. Useful
  # for a "redeploy from scratch" against a long-lived external
  # CH that you don't want to manually wipe with clickhouse-client.
  #
  # Idempotent (DROP DATABASE IF EXISTS), but every helm upgrade
  # while this stays true will re-wipe the database. Flip back to
  # false after the first install or you will keep losing data.
  resetSchema: false

  external:
    # Single host: "ch.databases.svc:9000"
    # Multi-node external cluster: comma-separated seeds — the driver
    # round-robins / fails over across them, so a 4-node cluster
    # outside the OpenShift cluster can be wired without a separate
    # LB. Use 9000 for plain native, 9440 for native-TLS (set
    # `secure: true` below).
    #   addr: "ch1.example:9440,ch2.example:9440,ch3.example:9440,ch4.example:9440"
    addr: ""

  database: "coremetry"
  username: "default"
  # password comes from secret.clickHousePassword (or existingSecret); empty
  # password is honoured (in-cluster CH starts with ALLOW_EMPTY_PASSWORD=yes)

  # Native-TLS toggle. Set `secure: true` when pointing at LDAPS-style
  # 9440 endpoints (ClickHouse Cloud, internal CA-signed clusters,
  # etc.). `insecureSkipVerify` is the escape hatch for self-signed
  # certs — leave false in production once a CA bundle is loaded.
  secure: false
  insecureSkipVerify: false

  maxOpenConns: 20

  # In-cluster StatefulSet options (consulted only when enabled: true).
  # The official ClickHouse image runs as USER 101 (clickhouse) with a
  # fixed UID — fine on vanilla k8s, but on OpenShift you'll need to bind
  # `anyuid` SCC to the service account, OR use external CH:
  #   oc adm policy add-scc-to-user anyuid -z <release>-coremetry-clickhouse \
  #     -n <namespace>
  image:
    registry: ""                                 # empty = docker.io
    repository: clickhouse/clickhouse-server
    tag: "24.8-alpine"
    pullPolicy: IfNotPresent
  storage:
    size: 20Gi
    storageClassName: ""   # empty = cluster default
    accessModes: ["ReadWriteOnce"]
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "2",  memory: 4Gi }
  service:
    type: ClusterIP
    nativePort: 9000        # CH native protocol — coremetry connects here
    httpPort: 8123          # Useful for ad-hoc clickhouse-client / debugging
  podSecurityContext: {}    # OpenShift assigns UID + fsGroup automatically

# ── Logs read backend ───────────────────────────────────────────────────────
#
# Coremetry's ingest pipeline always writes logs to ClickHouse. This block
# only changes the READ side — pick "elasticsearch" to point /api/logs at
# an external ES cluster that your existing shipping pipeline already
# populates (Filebeat / Logstash / OTel Collector ES exporter), without
# re-indexing.
#
# Auth precedence (per https://github.com/elastic/go-elasticsearch):
#   1. apiKey   — preferred for prod; scoped + rotatable
#   2. username + password (basic auth)
#   3. no auth  — only sane for `xpack.security.enabled: false` clusters
#
# In all cases the field paths inside each ES document default to the OTel
# Collector ES exporter's ECS mapping (trace.id, span.id, service.name,
# message, log.level, @timestamp). Override per-deployment if your
# shipping pipeline uses a different shape.
logs:
  backend: clickhouse        # "clickhouse" (default) | "elasticsearch"
  elasticsearch:
    addresses: []            # e.g. ["https://es.example.com:9200"]
    index: "logs-otel-default"
    username: ""             # leave empty when using apiKey or no auth
    insecureSkipVerify: false # true only for self-signed certs in dev/test
    # password / apiKey come from the Secret (secrets.esPassword,
    # secrets.esApiKey) so they don't end up in `helm get values` output.

# Redis (cache + distributed lock). Setting `enabled: true` creates a small
# in-cluster Deployment good for dev/small prod. For high-throughput
# deployments use a managed Redis and set `external.url` instead.
redis:
  enabled: true
  external:
    url: ""               # e.g. "redis://my-redis.svc:6379/0" — overrides in-cluster
  image:
    registry: ""          # empty = docker.io
    repository: library/redis
    tag: 7-alpine
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }

# OTel Collector — runs as a sidecar deployment, accepts OTLP from apps,
# forwards to coremetry over gRPC. Disable if you already operate a collector
# elsewhere and point apps directly at coremetry's gRPC service.
otelCollector:
  enabled: true
  image:
    registry: ""          # empty = docker.io
    repository: otel/opentelemetry-collector-contrib
    tag: "0.111.0"
  service:
    type: ClusterIP
    grpcPort: 4317
    httpPort: 4318
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: "1",  memory: 512Mi }

# Java demo — Spring Boot e-commerce app with zero-code OTel auto-
# instrumentation + sidecar profile pusher. Off by default; flip on for
# a "see traces flow end-to-end" demo install.
javaDemo:
  enabled: false
  image:
    registry: "ghcr.io"
    repository: cilcenk/coremetry-java-demo
    tag: ""               # defaults to .Chart.appVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: "1",  memory: 1Gi }
  # Anything else you want to inject into the pod (e.g. extra OTEL_*
  # attributes, async-profiler tuning). Standard env vars are wired
  # automatically — Otel endpoint and the coremetry profile-push URL.
  extraEnv: []
  service:
    type: ClusterIP
    grpcPort: 4317
    httpPort: 4318
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: "1",  memory: 512Mi }

serviceAccount:
  create: true
  annotations: {}
  name: ""
