{{- if and .Values.redis.enabled (not .Values.redis.external.url) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qmetry.fullname" . }}-redis
  labels:
    {{- include "qmetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  strategy: { type: Recreate }   # single-instance dev redis; no rolling
  selector:
    matchLabels:
      {{- include "qmetry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "qmetry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          # All cached/locked data is rebuildable from ClickHouse, so
          # appendonly + RDB are off. Treat this Redis as ephemeral.
          args: ["redis-server", "--appendonly", "no", "--save", ""]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 5
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qmetry.fullname" . }}-redis
  labels:
    {{- include "qmetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "qmetry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
{{- end -}}
