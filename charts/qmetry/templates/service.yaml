apiVersion: v1
kind: Service
metadata:
  name: {{ include "qmetry.fullname" . }}
  labels: {{- include "qmetry.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "qmetry.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: otlp-grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
