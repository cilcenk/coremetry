listen:
  http: ":8088"   # Web UI + REST API + direct OTLP/HTTP fallback
  grpc: ":4317"   # OTLP/gRPC ingest (collector forwards here)

clickhouse:
  addr: "127.0.0.1:9000"
  database: "coremetry"
  username: "default"
  password: ""
  # 0 = self-size (5 signals x workers + 8). A pinned 10 starved the
  # flushers even locally — Coremetry's own error spans showed
  # 'acquire conn timeout' (self-telemetry, 2026-07-15).
  max_open_conns: 0
  dial_timeout: "5s"
  # Distributed-CH mode (optional). Set cluster_name to the
  # <remote_servers> entry on every CH node — Coremetry then
  # creates Replicated*MergeTree per shard + Distributed wrappers
  # automatically. Leave empty for single-node deployments. See
  # docs/clickhouse-cluster.md for the operator setup.
  # cluster_name: "coremetry_cluster"
  # replica_path: "/clickhouse/tables"     # default ZK path prefix
  # shard_key: "rand()"                    # or cityHash64(trace_id)

retention:
  spans_days: 30
  logs_days: 30
  metrics_days: 7

ingestion:
  batch_size: 10000
  buffer_size: 500000      # 10s of headroom at 50k spans/sec burst
  flush_interval: "2s"
  workers: 8                # parallel flushers; honored as of v0.2.59

# Optional. Empty url = single-instance mode (no cache, always-leader lock).
# Set this to enable hot caching of frequently-polled endpoints AND to make
# background workers safe to run across multiple Coremetry replicas.
redis:
  url: ""   # e.g. "redis://localhost:6379/0"


auth:
  # Set jwt_secret to a long random string in production. If left empty
  # one is generated on startup but rotates on every restart, invalidating
  # all sessions.
  jwt_secret: ""
  token_ttl: "24h"
  initial_admin: "admin@coremetry.local"
  initial_password: "admin"     # change after first login

  # ── Optional: OIDC / SSO ─────────────────────────────────────────────────
  # Local username/password is always available even when OIDC is on, so
  # admins keep a fallback if the IdP becomes unreachable.
  oidc:
    enabled: false
    issuer_url: ""              # e.g. https://accounts.google.com
    client_id: ""
    client_secret: ""
    redirect_url: ""            # e.g. https://coremetry.example.com/api/auth/oidc/callback
    scopes: ["openid", "email", "profile"]
    display_name: "SSO"         # text shown on the login button
    default_role: "viewer"      # role given to first-time OIDC users
    allowed_domains: []         # optional whitelist, e.g. ["acme.com"]
