services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: coremetry-clickhouse
    # Ports exposed to the host for local dev convenience. When deploying
    # publicly via Cloudflare Tunnel, comment these two out — the coremetry
    # container reaches CH over the docker network only.
    ports:
      - "9000:9000"   # native protocol
      - "8123:8123"   # HTTP
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  coremetry:
    # `image:` here serves two purposes: (1) docker compose
    # tags the freshly-built image as coremetry:latest so a
    # plain `docker pull` works, and (2) re-uses the cached
    # image on subsequent `up` invocations without rebuild.
    image: coremetry:${VERSION:-latest}
    build:
      context: .
      tags:
        - "coremetry:latest"
        - "coremetry:${VERSION:-latest}"
      args:
        # Stamps the running binary with the release tag. The
        # Makefile auto-fills $VERSION via `git describe` so
        # local builds get a real tag like "v0.4.48-3-gabc"
        # instead of the literal "dev". CI / release scripts
        # override:
        #   VERSION=v0.4.50 docker compose build coremetry
        # Both the Go binary AND the Vite SPA pick this up.
        VERSION: "${VERSION:-dev}"
        VITE_APP_VERSION: "${VERSION:-dev}"
    container_name: coremetry
    # The OTel Collector handles OTLP/HTTP for apps now, so coremetry only
    # exposes its web/API port externally. OTLP/gRPC stays internal — the
    # collector forwards over the docker network.
    ports:
      - "8088:8088"   # Web UI + REST API + direct OTLP/HTTP fallback
    environment:
      COREMETRY_CH_ADDR: "clickhouse:9000"
      # CH password — keep in sync with the clickhouse service above. Read
      # from .env so secrets stay out of the repo.
      COREMETRY_CH_PASSWORD: "${CLICKHOUSE_PASSWORD:-}"
      # JWT signing key. REQUIRED for any non-throwaway deployment — empty
      # → ephemeral random key, all sessions invalidated on every restart.
      # Generate one with: openssl rand -hex 32
      COREMETRY_JWT_SECRET: "${COREMETRY_JWT_SECRET:-}"
      # Bootstrap admin password applied on first boot only (when the users
      # table is empty). Override before exposing publicly.
      COREMETRY_INITIAL_ADMIN: "${COREMETRY_INITIAL_ADMIN:-admin@coremetry.local}"
      COREMETRY_INITIAL_PASSWORD: "${COREMETRY_INITIAL_PASSWORD:-admin}"
      # Demo deployments only — exposes admin credentials on the login
      # page. NEVER set this on a real deployment.
      COREMETRY_DEMO_MODE: "${COREMETRY_DEMO_MODE:-}"
      # Hot-cache + distributed lock backend. Comment out to fall back to
      # single-instance mode (no cache, always-leader background workers).
      COREMETRY_REDIS_URL: "redis://redis:6379/0"
      # AI Copilot — explain-trace / explain-problem endpoints, plus
      # the inline "🤖 AI explain" buttons in the UI. Bring your own
      # Anthropic API key (https://console.anthropic.com/ → API Keys).
      # Empty = feature dormant + buttons hidden.
      COREMETRY_AI_API_KEY: "${COREMETRY_AI_API_KEY:-}"
      COREMETRY_AI_MODEL:   "${COREMETRY_AI_MODEL:-claude-sonnet-4-6}"
      # Logs read backend. "clickhouse" (default) keeps the existing path;
      # "elasticsearch" makes /api/logs query ES directly so logs shipped
      # by the collector's ES exporter are searchable in the Coremetry UI.
      COREMETRY_LOGS_BACKEND: "elasticsearch"
      COREMETRY_ES_ADDRESSES: "http://elasticsearch:9200"
      COREMETRY_ES_INDEX: "logs-otel-default"
      # Authentication — the bundled local ES has security disabled so
      # nothing is needed here. Test / prod clusters typically require
      # one of:
      #
      #   COREMETRY_ES_API_KEY:  base64 "id:api_key" (the `encoded`
      #                          field returned by POST /_security/api_key
      #                          in Kibana / the ES API). Preferred —
      #                          can be scoped to a single index pattern
      #                          and rotated without touching user accounts.
      #
      #   COREMETRY_ES_USERNAME + COREMETRY_ES_PASSWORD: HTTP basic auth.
      #                          Set both; either alone is ignored.
      #
      # Set ONE of the two — if both are present the API key wins. If
      # the cluster's certificate is self-signed (most test envs),
      # COREMETRY_ES_INSECURE=true skips chain verification.
      # COREMETRY_ES_API_KEY: "${COREMETRY_ES_API_KEY:-}"
      # COREMETRY_ES_USERNAME: "${COREMETRY_ES_USERNAME:-}"
      # COREMETRY_ES_PASSWORD: "${COREMETRY_ES_PASSWORD:-}"
      # COREMETRY_ES_INSECURE: "${COREMETRY_ES_INSECURE:-}"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ── Cloudflare Tunnel (publish the UI to a public HTTPS URL) ────────────────
  # Two modes:
  #
  #   1) Quick tunnel — no Cloudflare account, no domain. The container
  #      prints a random *.trycloudflare.com URL to its logs. Default mode
  #      when CLOUDFLARE_TUNNEL_TOKEN is empty. Ephemeral — URL changes on
  #      every restart, intended for dev/preview.
  #
  #   2) Named tunnel — paste a tunnel token from
  #      https://one.dash.cloudflare.com/ → Networks → Tunnels into
  #      CLOUDFLARE_TUNNEL_TOKEN in .env. Persistent URL like
  #      coremetry.yourdomain.com (configured in the dashboard).
  #
  # Activate with:  docker compose --profile tunnel up -d cloudflared
  # Quick (ephemeral) tunnel — no Cloudflare account, no domain. The
  # container prints a random *.trycloudflare.com URL to its logs. URL
  # changes on every restart; intended for dev/preview shares.
  #
  # Activate with:  docker compose --profile tunnel up -d cloudflared
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: coremetry-cloudflared
    command: tunnel --no-autoupdate --url http://coremetry:8088
    depends_on:
      coremetry:
        condition: service_started
    restart: unless-stopped
    profiles: ["tunnel"]

  # Named tunnel — persistent URL on your own Cloudflare-managed domain.
  # Requires CLOUDFLARE_TUNNEL_TOKEN in .env (from
  # https://one.dash.cloudflare.com/ → Networks → Tunnels). Public
  # hostname → http://coremetry:8088 must be configured in the dashboard.
  #
  # Activate with:  docker compose --profile tunnel-named up -d cloudflared-named
  cloudflared-named:
    image: cloudflare/cloudflared:latest
    container_name: coremetry-cloudflared-named
    command: tunnel --no-autoupdate run
    environment:
      # cloudflared exits with a clear error if this is empty.
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN:-}"
    depends_on:
      coremetry:
        condition: service_started
    restart: unless-stopped
    profiles: ["tunnel-named"]

  # Hot cache (services list, metric names, sidebar problem count) +
  # distributed lock for the evaluator/anomaly workers. Lightweight —
  # appendonly disabled because all data here is rebuildable from CH.
  redis:
    image: redis:7-alpine
    container_name: coremetry-redis
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── Elasticsearch (logs sink) ──────────────────────────────────────────────
  # Single-node, security-disabled — for local development only. The OTel
  # Collector's elasticsearch exporter writes logs here in ECS mode (so
  # trace.id / span.id / service.name end up at canonical ECS paths), and
  # Coremetry's ES log backend reads from the same index.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: coremetry-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '\"status\":\"(yellow|green)\"' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # OpenTelemetry Collector — apps send here, collector forwards to coremetry.
  # Standard OTLP ports (4317/4318) are exposed on the host as 14317/14318
  # so they don't clash with coremetry's direct ports.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: coremetry-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "14317:4317"   # OTLP gRPC (apps connect here)
      - "14318:4318"   # OTLP HTTP
      - "13133:13133"  # health check
    depends_on:
      coremetry:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ── Grafana: Coremetry pre-wired as a Tempo datasource ─────────────────────────
  # Open http://localhost:3000 (admin/admin) → Explore → Coremetry (Tempo).
  # Disable with `docker compose up -d` (omit profile).
  grafana:
    image: grafana/grafana:11.3.0
    container_name: coremetry-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - coremetry
    restart: unless-stopped
    profiles: ["grafana", "demo"]

  # ── Pyroscope (continuous profiling, Grafana stack) ─────────────────────────
  # Ingests CPU/memory profiles from app agents (Java, Go, .NET, Ruby, etc.)
  # Coremetry ships its own pprof ingest at /v1/profiles for ad-hoc captures,
  # but Pyroscope is the de-facto standard for *continuous* profiling and has
  # a far richer flame-graph UI. Run alongside; java-demo's profile-pusher
  # below targets it.
  #
  # UI: http://localhost:4040  (no auth in dev)
  pyroscope:
    image: grafana/pyroscope:1.7.1
    container_name: coremetry-pyroscope
    ports:
      - "4040:4040"
    restart: unless-stopped

  # ── Java demo: zero-code OTel auto-instrumentation ──────────────────────────
  # Spring Boot app, no OTel imports in source. The javaagent injects all
  # traces/metrics/logs at JVM startup; async-profiler pushes CPU profiles.
  java-demo:
    build:
      context: ./java-demo
    container_name: coremetry-java-demo
    environment:
      OTEL_SERVICE_NAME: java-demo
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=demo,host.name=java-demo-1,service.version=0.1.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
      OTEL_INSTRUMENTATION_RUNTIME_TELEMETRY_ENABLED: "true"
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
      # W3C Trace Context (https://www.w3.org/TR/trace-context/) is the
      # default in modern OTel SDKs but pinning it explicitly makes the
      # propagation contract visible to anyone reading this file. Every
      # service in the stack must agree on the same propagator(s) for
      # cross-service spans to chain into one trace — mixing tracecontext
      # with B3 / Jaeger across services breaks that.
      OTEL_PROPAGATORS: "tracecontext,baggage"
      # Pyroscope continuous profiling — agent pushes CPU + alloc
      # profiles every ~10s. Tagged with service+env so the Pyroscope
      # UI can group by service. Open http://localhost:4040 to view.
      PYROSCOPE_APPLICATION_NAME: "java-demo"
      PYROSCOPE_SERVER_ADDRESS: "http://pyroscope:4040"
      PYROSCOPE_FORMAT: "jfr"
      PYROSCOPE_PROFILING_INTERVAL: "10s"
      PYROSCOPE_LABELS: "service.name=java-demo,deployment.environment=demo"
      # Profile pusher (sidecar shell script — not OTel)
      COREMETRY_URL: "http://coremetry:8088"
      PROFILE_INTERVAL_SEC: "15"
      PROFILE_WINDOW_SEC: "10"
      PROFILE_ENGINE: wall   # wallclock sampling — captures all threads, no kernel perms needed
    ports:
      - "8080:8080"
    depends_on:
      - otel-collector
      - coremetry
    restart: unless-stopped

  # ── Multi-service traffic generator (8 services, real OTLP) ─────────────────
  # Emits realistic cross-service traces over OTLP HTTP — frontend →
  # api-gateway → (product-service / order-service → payment-service /
  # cart-service / search-service / user-service). Populates the service
  # graph, multi-service aggregates, and the trace waterfall with proper
  # parent_id chains across services. Source: cmd/demo.
  go-demo:
    build: .
    container_name: coremetry-go-demo
    entrypoint: ["./demo"]
    command: ["-endpoint", "http://otel-collector:4318", "-rps", "3"]
    depends_on:
      - otel-collector
    restart: unless-stopped

volumes:
  clickhouse-data:
  grafana-data:
