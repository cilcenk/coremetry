<!doctype html>
<html lang="en" data-theme="redhat">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coremetry</title>
    <meta name="description" content="Enterprise OpenTelemetry APM" />
    <link rel="icon" href="/favicon.ico" />
    <!--
      Inline theme boot — applies the saved theme BEFORE first
      paint so the operator never sees a flash of the wrong
      palette when a session loads. Was inline in layout.tsx;
      moves here verbatim under Vite (no SSR).
    -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('coremetry-theme');
          // v0.8.285 — default to 'redhat' (PatternFly/OpenShift) for new
          // sessions; a saved pref still wins so existing users keep their pick.
          if (t !== 'light' && t !== 'dark' && t !== 'redhat') t = 'redhat';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'redhat');
        }
      })();
    </script>
    <!--
      Inline density boot (v0.5.452) — mirrors the theme bootstrap
      above so the operator never sees a flash of "comfortable"
      density before React's useEffect hydrates the saved choice.
      Same FOUC-avoidance pattern; 4 levels per DensityToggle.tsx.
    -->
    <script>
      (function() {
        try {
          var d = localStorage.getItem('coremetry-density');
          var allowed = { spacious:1, comfortable:1, compact:1, dense:1 };
          if (!allowed[d]) d = 'comfortable';
          document.documentElement.setAttribute('data-density', d);
        } catch (e) {
          document.documentElement.setAttribute('data-density', 'comfortable');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
