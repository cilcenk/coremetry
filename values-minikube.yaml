# values-minikube.yaml — local minikube prod-parity install (v0.6.66)
#
# Runs the REAL Helm chart (charts/coremetry) in distributed mode on a
# laptop minikube (docker driver, ~6GB), so the production deployment
# artifact gets exercised end-to-end — not the docker-compose
# approximation. Use docker-compose for the fast edit→rebuild→verify dev
# loop; use this for "does the chart actually deploy + run distributed".
#
#   make minikube-up      # build + minikube image load + helm upgrade --install
#   make minikube-down
#
# Differences from the production defaults, all to fit a laptop:
#   - image: a locally-built coremetry:local loaded via `minikube image
#     load`, pullPolicy: Never (never reach out to GHCR).
#   - distributed mode but 1 replica per role (5→3 pods) — enough to
#     prove the split + leader-lock without 5×1Gi requests.
#   - resource requests cut hard so the whole stack (CH + Redis +
#     collector + demo + 3 coremetry) schedules under 6GB.
#   - javaDemo on, so there's live traffic to look at.
#   - logs.backend=clickhouse (chart default) — no Elasticsearch pod.

# Local HA: 3 monolithic replicas (leader-locked workers via Redis). Requires a
# SHARED jwtSecret below — otherwise each pod mints an ephemeral key and auth
# flaps across the load balancer (see memory feedback-multipod-needs-shared-jwtsecret).
replicaCount: 3

image:
  registry: "ghcr.io"
  repository: "cilcenk/coremetry"
  tag: "v0.7.1"           # 'make minikube-up' overrides via --set image.tag=$VERSION; a unique per-build tag avoids minikube's stale-:local image cache
  pullPolicy: Never       # image is side-loaded into minikube; never pull

deployment:
  # Operator instruction (2026-06-09): local minikube runs MONOLITHIC.
  # The distributed HA-test config below is kept for reference but only
  # takes effect if mode is flipped back deliberately. Note: the
  # v0.8.104 incident — re-applying this file with mode: distributed
  # over the operator's monolithic release spawned role deployments
  # that leaked as helm orphans when the upgrade failed.
  mode: monolithic
  roles:
    ingest:
      replicas: 2         # HA test (was 1) — 2 ingest pods behind the gRPC Service
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: "1",  memory: 1Gi }
    api:
      replicas: 2         # HA test — 2 api pods (SSE/MCP session affinity via ClientIP)
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: "1",  memory: 1Gi }
    worker:
      replicas: 2         # HA test — leader-elected via Redis: 1 active + 1 hot standby
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: "1",  memory: 1Gi }
    agent:
      enabled: true       # HA test — runbook automated-step agent (http/js/bash)
      replicas: 2         # per-execution Redis lock makes 2 agents safe
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: "1",  memory: 1Gi }

# Chart-wide fallback (consulted by any role with empty resources).
resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: "1",  memory: 1Gi }

secrets:
  initialAdminPassword: "admin"   # matches the compose dev creds
  jwtSecret: "5b2f9c1e8a47d3066f1b4e9c2a7d50e3c8916b4af20d7e35198ca6b0f4d2371e"   # LOCAL DEV ONLY — fixed so all replicas share one signing key (multi-pod auth). Use secrets.existingSecret in prod.

clickhouse:
  enabled: true
  containerSecurityContext: null   # null (not {}) so Helm coalesce DROPS the hardened default → CH image runs as its own user
  resources:
    requests: { cpu: 250m, memory: 768Mi }
    limits:   { cpu: "2",  memory: 2Gi }
  storage:
    size: 5Gi             # laptop PVC

redis:
  enabled: true
  containerSecurityContext: null   # null (not {}) so Helm coalesce DROPS the hardened default → redis runs as its own user
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 500m, memory: 512Mi }

otelCollector:
  enabled: true
  # Cloud fan-out → OneUptime (v0.6.70). The collector dual-exports: every span/
  # metric/log goes to BOTH the in-cluster Coremetry ingest AND OneUptime cloud.
  # The ingestion token lives in a Secret (NOT in this committed file) — create
  # it once before `make minikube-up`:
  #   kubectl create secret generic coremetry-oneuptime \
  #     -n coremetry --from-literal=token=<your-oneuptime-ingestion-token>
  # Disabled locally — oneuptime.com isn't reachable from minikube (DNS), so the
  # exporter just spammed retry errors. Re-enable when you have connectivity +
  # the coremetry-oneuptime token Secret.
  oneuptime:
    enabled: false
    endpoint: "https://oneuptime.com/otlp"
    tokenHeader: "x-oneuptime-token"
    existingSecret: "coremetry-oneuptime"
    tokenSecretKey: "token"
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: "1",  memory: 1Gi }
  # v0.7.14 — dual-ship logs to the standalone minikube ES (kubectl apply -f
  # minikube-elasticsearch.yaml) so the logs.backend=elasticsearch read path is
  # exercised locally. Collector writes logs to BOTH Coremetry (CH) and ES.
  elasticsearch:
    enabled: true
    endpoint: "http://coremetry-elasticsearch:9200"
    logsIndex: "coremetry-logs"

logs:
  # Read logs from the standalone ES the collector dual-ships to (v0.7.14).
  # CH is still the write store; ES is the read backend (invariant #2).
  backend: elasticsearch
  elasticsearch:
    addresses: ["http://coremetry-elasticsearch:9200"]
    index: "coremetry-logs*"

javaDemo:
  # Live traffic generator. The GHCR demo image isn't published for this
  # tag, so we side-load a locally-built one (`gotrace-java-demo` →
  # ghcr.io/cilcenk/coremetry-java-demo:local) and never pull. `make
  # minikube-up` builds + loads it; this flag wires it into the deploy so
  # the k8s stack shows real spans/metrics/logs end-to-end.
  enabled: true
  image:
    tag: "local"
    pullPolicy: Never
  resources:
    requests: { cpu: 200m, memory: 384Mi }
    limits:   { cpu: "1",  memory: 1Gi }

# go-demo — the cmd/demo retail-banking traffic generator on k8s (v0.7.18).
# Side-loaded image (never pull); points its -endpoint at the in-cluster
# collector so its 20 banking services show up in topology/traces alongside
# java-demo.
goDemo:
  enabled: true
  image:
    pullPolicy: Never
  rps: 3
